{% load static %}

<div id="sidebar-overlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity duration-300"></div>

<aside id="main-sidebar" 
       class="fixed inset-y-0 left-0 w-80 bg-gray-950 border-r border-white/5 z-50 
              transform -translate-x-full transition-transform duration-300 ease-in-out
              md:translate-x-0 md:static md:inset-0 md:flex md:flex-col md:flex-shrink-0">
    
    <div class="h-20 flex items-center justify-between px-6 border-b border-white/5">
        <a href="/" class="flex items-center space-x-3 group">
            <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform">
                <span class="text-white font-bold text-lg">A</span>
            </div>
            <span class="text-lg font-black text-white tracking-tighter uppercase">AVENIR-<span class="text-indigo-400">TECH</span></span>
        </a>
        <button id="close-sidebar" class="md:hidden text-gray-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <nav class="py-6 px-4 space-y-1">
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3 mb-2">Navigation</p>
        <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-indigo-600/10 text-indigo-400 rounded-xl font-bold transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            <span>Vue d'ensemble</span>
        </a>
    </nav>

    <div class="flex-grow flex flex-col min-h-0 border-t border-white/5">
        <div class="p-4">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3">Assistant IA Groq</p>
        </div>

        <div id="ai-chat-history" class="flex-grow overflow-y-auto px-4 space-y-4 custom-scrollbar text-sm">
            <div class="bg-white/5 border border-white/5 rounded-2xl p-3">
                <p class="text-[10px] text-indigo-400 font-bold mb-1 uppercase">Assistant</p>
                <p class="text-gray-300 leading-relaxed">Prêt à manipuler vos données. Demandez-moi de supprimer, remplacer ou filtrer des informations.</p>
            </div>
            </div>

        <div class="p-4 bg-gray-950/50 backdrop-blur-md border-t border-white/5">
            <div class="relative">
                <textarea 
                    id="aiSidebarInput" 
                    rows="2"
                    placeholder="Une commande..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-4 pr-12 text-sm text-white placeholder-gray-500 focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none custom-scrollbar"
                ></textarea>
                <button 
                    id="sendSidebarAi"
                    class="absolute right-2 bottom-2 p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition-all active:scale-90"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
            <p class="text-[9px] text-gray-600 mt-2 text-center uppercase tracking-tighter">Traitement par Llama-3 (Groq)</p>
        </div>
    </div>
</aside>
