<header class="mb-10 text-center">
    <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Analyseur de Fichiers</h1>
    <p class="mt-2 text-gray-600 italic">Importez vos fichiers CSV ou Excel en toute simplicité.</p>
</header>

<section class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 mb-10">
    <form id="uploadForm" class="flex flex-col md:flex-row items-center gap-4">
        {% csrf_token %}
        <div class="flex-grow w-full">
            <input type="file" id="fileInput" name="file" accept=".csv, .xlsx, .xls" 
                   class="block w-full text-sm text-gray-500
                          file:mr-4 file:py-2.5 file:px-6
                          file:rounded-full file:border-0
                          file:text-sm file:font-bold
                          file:bg-indigo-50 file:text-indigo-700
                          hover:file:bg-indigo-100 transition-all cursor-pointer">
        </div>
        <button type="submit" 
                class="w-full md:w-auto bg-indigo-600 text-white font-bold py-2.5 px-8 rounded-full hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all active:scale-95">
            Analyser
        </button>
    </form>
</section>

<section id="resultContainer" class="hidden">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto max-h-[600px]">
            <table class="min-w-full leading-normal" id="dataTable">
                <thead id="tableHead">
                    </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</section>
